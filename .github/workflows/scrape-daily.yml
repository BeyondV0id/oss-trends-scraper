name: Trending Scraper (Daily)

on:
  schedule:
    - cron: "0 0 * * *"   # daily at 00:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SCRAPE_MODE: daily

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trending-scraper .

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.SCRAPER_DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e DATABASE_URL \
            -e GITHUB_TOKEN \
            -e SCRAPE_MODE \
            trending-scraper \
            python run_scrape.py
