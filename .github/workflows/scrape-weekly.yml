name: Trending Scraper (Weekly)

on:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday at 00:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SCRAPE_MODE: weekly

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trending-scraper .

      - name: Run scraper
        run: |
          docker run --rm \
            -e "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            -e "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" \
            -e "SCRAPE_MODE=$SCRAPE_MODE" \
            trending-scraper \
            python run_scrape.py
